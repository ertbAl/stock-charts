<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TickerDB Chart Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg-primary:   #0a0f17;
    --bg-secondary: #111a26;
    --bg-elevated:  #162537;
    --bg-card:      #0f1c2d;
    --border:       rgba(45, 217, 195, 0.12);
    --border-hover: rgba(45, 217, 195, 0.35);
    --text-primary: #f4f7fb;
    --text-muted:   #7a8fa8;
    --accent:       #2dd9c3;
    --accent-2:     #ff7a33;
    --accent-soft:  rgba(45, 217, 195, 0.15);
    --accent-glow:  rgba(45, 217, 195, 0.08);
    --font-display: 'Space Grotesk', sans-serif;
    --font-body:    'Plus Jakarta Sans', sans-serif;
    --header-h:     64px;
    --cols:         4;
    --radius:       10px;
    --trans:        0.22s cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
    font-family: var(--font-body);
    background: #080c13;
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
}

/* ---- ambient glow ---- */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse 60% 40% at 10% 5%,  rgba(45,217,195,.07), transparent),
        radial-gradient(ellipse 50% 35% at 90% 90%, rgba(255,122,51,.06), transparent);
    pointer-events: none;
    z-index: 0;
}

/* ================================================================
   HEADER
   ================================================================ */
header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    z-index: 100;
    background: rgba(10, 15, 23, 0.88);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
}

.brand {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
    white-space: nowrap;
    flex-shrink: 0;
}
.brand span { color: var(--text-muted); font-weight: 400; }

.controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
}

/* shared control chrome */
.ctrl {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 0.8rem;
    height: 36px;
    padding: 0 12px;
    outline: none;
    transition: border-color var(--trans), box-shadow var(--trans);
}
.ctrl:focus, .ctrl:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
}

#search {
    min-width: 0;
    flex: 1;
    max-width: 280px;
}
#search::placeholder { color: var(--text-muted); }

#index-filter { cursor: pointer; padding-right: 8px; }
#index-filter option { background: var(--bg-elevated); }

.slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}
.slider-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 42px;
    text-align: right;
}

#col-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 4px;
    background: var(--bg-elevated);
    border-radius: 2px;
    border: 1px solid var(--border);
    outline: none;
    cursor: pointer;
    accent-color: var(--accent);
}
#col-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
    cursor: pointer;
}

#status {
    margin-left: auto;
    font-size: 0.72rem;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
}
#status strong { color: var(--accent); }

/* ---- ratio toggle ---- */
.mode-toggle {
    display: flex;
    align-items: center;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
}
.mode-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0 12px;
    height: 36px;
    cursor: pointer;
    transition: background var(--trans), color var(--trans);
    white-space: nowrap;
}
.mode-btn.active {
    background: var(--accent-soft);
    color: var(--accent);
}
.card-mode-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(10,15,23,0.75);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 7px;
    cursor: pointer;
    z-index: 2;
    transition: color var(--trans), border-color var(--trans);
}
.card-mode-btn:hover { color: var(--accent); border-color: var(--accent); }
.card-mode-btn.ratio-active { color: var(--accent-2); border-color: var(--accent-2); }

/* ================================================================
   GRID
   ================================================================ */
main {
    position: relative;
    z-index: 1;
    padding: calc(var(--header-h) + 24px) 24px 48px;
    display: grid;
    grid-template-columns: repeat(var(--cols), minmax(0, 1fr));
    gap: 14px;
}

/* ---- card ---- */
.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition:
        border-color var(--trans),
        transform var(--trans),
        box-shadow var(--trans);
    animation: fadeIn 0.35s ease both;
}
.card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow:
        0 8px 32px rgba(0,0,0,.45),
        0 0 0 1px var(--border-hover),
        0 0 18px var(--accent-glow);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #0a1520;
    overflow: hidden;
}
.card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    transition: transform 0.4s ease, opacity 0.3s ease;
}
.card:hover .card-img-wrap img { transform: scale(1.04); }

/* placeholder when image not found */
.card-img-wrap .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 0.7rem;
}
.placeholder-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    opacity: 0.5;
}

.card-foot {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    min-height: 36px;
}
.ticker {
    font-family: var(--font-display);
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.04em;
}
.idx-tag {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid rgba(45,217,195,.2);
    border-radius: 4px;
    padding: 2px 6px;
    text-transform: uppercase;
}

/* ---- empty state ---- */
#empty {
    display: none;
    grid-column: 1 / -1;
    padding: 80px 24px;
    text-align: center;
}
#empty h2 {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 8px;
}
#empty p { font-size: 0.8rem; color: var(--text-muted); opacity: .7; }

/* ================================================================
   LIGHTBOX
   ================================================================ */
#lightbox {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
}
#lightbox.open {
    opacity: 1;
    pointer-events: all;
}

#lb-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(5, 8, 14, 0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

#lb-panel {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: min(90vw, 1100px);
    max-height: 90vh;
    width: 100%;
}

#lb-bar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 12px;
}
#lb-caption {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.05em;
}
#lb-caption span {
    color: var(--accent);
    font-weight: 400;
    font-size: 0.8rem;
    margin-left: 10px;
}
#lb-counter {
    font-size: 0.72rem;
    color: var(--text-muted);
}

#lb-main {
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
}

#lb-img {
    flex: 1;
    max-height: 78vh;
    object-fit: contain;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: #0a1520;
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
}

.lb-nav {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color var(--trans), background var(--trans);
    user-select: none;
}
.lb-nav:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
}

#lb-close {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.8rem;
    padding: 4px 12px;
    cursor: pointer;
    font-family: var(--font-body);
    transition: color var(--trans), border-color var(--trans);
    flex-shrink: 0;
}
#lb-close:hover { color: var(--accent-2); border-color: var(--accent-2); }

/* demo badge */
#demo-badge {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 200;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.68rem;
    color: var(--text-muted);
    display: none;
}
body.demo #demo-badge { display: block; }

@media (max-width: 640px) {
    :root { --cols: 2; }
    header { flex-wrap: wrap; height: auto; padding: 12px; gap: 8px; }
    .controls { flex-wrap: wrap; }
    main { padding-top: calc(var(--header-h) + 90px); gap: 8px; }
}

/* ================================================================
   EXPORT PANEL
   ================================================================ */
.export-wrap {
    position: relative;
    flex-shrink: 0;
}
#export-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 0.75rem;
    font-weight: 500;
    height: 36px;
    padding: 0 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: color var(--trans), border-color var(--trans), background var(--trans);
}
#export-btn:hover, #export-btn.open {
    color: var(--accent-2);
    border-color: var(--accent-2);
    background: rgba(255,122,51,0.08);
}
#export-panel {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 420px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    z-index: 200;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
}
#export-panel.open { display: block; }
.exp-title {
    font-family: var(--font-display);
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
}
.exp-row {
    margin-bottom: 8px;
}
.exp-label {
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-bottom: 4px;
}
.exp-cmd {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
}
.exp-cmd code {
    flex: 1;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    word-break: break-all;
    white-space: pre-wrap;
}
.exp-copy {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 0.65rem;
    padding: 3px 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: color var(--trans), border-color var(--trans);
}
.exp-copy:hover { color: var(--accent); border-color: var(--accent); }
.exp-copy.copied { color: #4CAF50; border-color: #4CAF50; }
.exp-note {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 10px;
    opacity: 0.7;
    line-height: 1.5;
}

/* ================================================================
   STAGE HEADERS + DOT
   ================================================================ */
.stage-header {
    grid-column: 1 / -1;
    padding: 12px 16px 4px;
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    border-left: 4px solid;
    margin-top: 8px;
}
.stage-header[data-stage="U3"] { color: #4CAF50; border-color: #4CAF50; }
.stage-header[data-stage="U2"] { color: #2196F3; border-color: #2196F3; }
.stage-header[data-stage="U1"] { color: #DAA520; border-color: #DAA520; }
.stage-header[data-stage="D1"] { color: #FF9800; border-color: #FF9800; }
.stage-header[data-stage="D2"] { color: #F44336; border-color: #F44336; }
.stage-header[data-stage="D3"] { color: #9E9E9E; border-color: #9E9E9E; }
.stage-header[data-stage="null"] { color: #616161; border-color: #616161; }

.stage-dot {
    display: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
}
body.stage-mode .stage-dot { display: inline-block; }
.stage-dot[data-stage="U3"] { background: #4CAF50; }
.stage-dot[data-stage="U2"] { background: #2196F3; }
.stage-dot[data-stage="U1"] { background: #DAA520; }
.stage-dot[data-stage="D1"] { background: #FF9800; }
.stage-dot[data-stage="D2"] { background: #F44336; }
.stage-dot[data-stage="D3"] { background: #9E9E9E; }
.stage-dot[data-stage="null"] { background: #616161; }

/* ---- MACE table ---- */
#mace-panel { background: var(--bg); }
.mace-controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: calc(var(--header-h) + 24px) 0 14px;
}
.mace-controls .ctrl { min-width: 150px; }
#mace-search { min-width: 220px; flex: 1; max-width: 360px; }
.mace-memberships {
    display: flex; flex-wrap: wrap; gap: 6px;
}
.mace-membership {
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 2px 7px; background: rgba(255,255,255,0.04);
    font-size: 0.72rem; white-space: nowrap;
}
.mace-membership-stage { font-family: monospace; font-weight: 700; color: var(--accent); }
.mace-table {
    width: 100%; border-collapse: collapse; font-size: 0.85rem;
    background: var(--card-bg, #0f1e2d); border-radius: 8px; overflow: hidden;
}
.mace-table th {
    padding: 10px 12px; text-align: left; font-weight: 600;
    background: rgba(255,255,255,0.06); color: var(--text-dim, #8a9aa5);
    cursor: pointer; user-select: none; white-space: nowrap;
}
.mace-table th:hover { color: var(--accent, #00BCD4); }
.mace-table th .sort-arrow { font-size: 0.7rem; margin-left: 4px; }
.mace-table td {
    padding: 8px 12px; border-top: 1px solid rgba(255,255,255,0.06);
}
.mace-table tr:hover td { background: rgba(255,255,255,0.03); }
.mace-stage { font-weight: 700; font-family: monospace; }
.mace-stage[data-s="U3"] { color: #4CAF50; }
.mace-stage[data-s="U2"] { color: #8BC34A; }
.mace-stage[data-s="U1"] { color: #CDDC39; }
.mace-stage[data-s="D1"] { color: #FF9800; }
.mace-stage[data-s="D2"] { color: #F44336; }
.mace-stage[data-s="D3"] { color: #9E9E9E; }
.mace-stage[data-s="null"] { color: #616161; }
.mace-stage[data-s="Mixed"] { color: var(--accent-2); }
.mace-signal { font-size: 0.8rem; color: var(--text-dim, #8a9aa5); }
.mace-signal.outperformer { color: #4CAF50; }
.mace-signal.underperformer { color: #F44336; }
.mace-signal.aligned-up { color: #8BC34A; }
.mace-signal.aligned-down { color: #9E9E9E; }
</style>
</head>
<body class="">

<!-- ambient grid lines -->
<div style="position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(45,217,195,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(45,217,195,.025) 1px,transparent 1px);
    background-size:48px 48px;"></div>

<header>
    <div class="brand">TickerDB <span>/ Charts</span></div>
    <div class="controls">
        <select id="index-filter" class="ctrl">
            <option value="">All indices</option>
                        <option value="DAX">DAX</option>
            <option value="DJI">DJI</option>
            <option value="MDAX">MDAX</option>
            <option value="NDX">NDX</option>
            <option value="SDAX">SDAX</option>
            <option value="SP500">SP500</option>
            <option value="SX5E">SX5E</option>
            <option value="SXXP">SXXP</option>
            <option value="TECDAX">TECDAX</option>
        </select>
        <input id="search" class="ctrl" type="text"
               placeholder="Search ticker or name..." autocomplete="off" spellcheck="false">
        <div class="mode-toggle">
            <button class="mode-btn active" id="btn-price" onclick="setGlobalMode('price')">Price</button>
            <button class="mode-btn" id="btn-ratio" onclick="setGlobalMode('ratio')">Ratio</button>
            <button class="mode-btn" id="btn-dividend" onclick="setGlobalMode('dividend')">Dividend</button>
            <button class="mode-btn" id="btn-stage" onclick="setGlobalMode('stage')">Stage</button>
            <button class="mode-btn" id="btn-mace" onclick="setGlobalMode('mace')">MACE</button>
        </div>
        <select id="stage-filter" class="ctrl" style="display:none"
                onchange="applyStageFilter(this.value)">
            <option value="">All stages</option>
            <option value="U3">U3 - Uptrend (best)</option>
            <option value="U2">U2 - Confirmed up</option>
            <option value="U1">U1 - Possible up</option>
            <option value="D1">D1 - Possible down</option>
            <option value="D2">D2 - Confirmed down</option>
            <option value="D3">D3 - Downtrend</option>
        </select>
        <select id="ratio-sort" class="ctrl" style="display:none"
                onchange="applyRatioSort(this.value)">
            <option value="">Sort: default</option>
            <option value="desc">Most outperformance (highest first)</option>
            <option value="asc">Most underperformance (lowest first)</option>
        </select>
        <div class="slider-wrap">
            <input id="col-slider" type="range" min="2" max="8" value="4">
            <span class="slider-label" id="col-label">4 cols</span>
        </div>
        <div class="export-wrap">
            <button id="export-btn" onclick="toggleExportPanel()">Export &#9660;</button>
            <div id="export-panel">
                <div class="exp-title">Export current view</div>
                <div class="exp-row">
                    <div class="exp-label">PDF</div>
                    <div class="exp-cmd">
                        <code id="exp-cmd-pdf"></code>
                        <button class="exp-copy" onclick="copyCmd('exp-cmd-pdf', this)">Copy</button>
                    </div>
                </div>
                <div class="exp-row">
                    <div class="exp-label">PPTX (template-based)</div>
                    <div class="exp-cmd">
                        <code id="exp-cmd-pptx"></code>
                        <button class="exp-copy" onclick="copyCmd('exp-cmd-pptx', this)">Copy</button>
                    </div>
                </div>
                <div class="exp-note">
                    Run from the project root in your terminal.<br>
                    Output: data/metastock/exports/
                </div>
            </div>
        </div>
    </div>
    <div id="status"></div>
</header>

<main id="grid">
    <div id="empty">
        <h2>No charts match your filter</h2>
        <p>Try a different index or clear the search</p>

const STAGE_ORDER = ["U3", "U2", "U1", "D1", "D2", "D3", null];
const STAGE_LABELS = {
    "U3": "U3 -- Well-defined Uptrend (S>M>L)",
    "U2": "U2 -- Confirmed Uptrend (S>L>M)",
    "U1": "U1 -- Possible Uptrend (L>S>M)",
    "D1": "D1 -- Possible Downtrend (M>S>L)",
    "D2": "D2 -- Confirmed Downtrend (M>L>S)",
    "D3": "D3 -- Well-defined Downtrend (L>M>S)",
    "null": "Unclassified"
};

// ============================================================
// State
// ============================================================
let visibleCards = [];  // DOM elements currently visible, for lightbox nav
let lbIndex = 0;        // which visible card is in the lightbox
let globalMode = localStorage.getItem('tickerdb_gallery_mode') || 'price';
// When set (via jumpToStage from the MACE table), applyFilter matches
// tickers by EXACT equality instead of substring. Cleared on any user
// input into the search/index controls so manual filtering feels normal
// again after the jump.
let pinnedTicker = null;

// ============================================================
// Build index option list
// ============================================================
const indices = Object.keys(DATA).sort();

// ============================================================
// Mode helpers
// ============================================================
// Dividend mode can only show US-covered indices (Tiingo cache).
// Disable every other option in the index dropdown while in dividend
// mode; re-enable all on exit. Default the dropdown to SP500 when
// entering dividend mode so the user lands somewhere useful.
var DIVIDEND_ALLOWED_INDICES = ['DJI', 'NDX', 'SP500'];
var _savedIndexFilterBeforeDividend = null;

function applyDividendIndexConstraint(mode) {
    var idx = document.getElementById('index-filter');
    if (!idx) { return; }
    if (mode === 'dividend') {
        if (_savedIndexFilterBeforeDividend === null) {
            _savedIndexFilterBeforeDividend = idx.value;
        }
        for (var i = 0; i < idx.options.length; i++) {
            var o = idx.options[i];
            var allow = o.value === '' || DIVIDEND_ALLOWED_INDICES.indexOf(o.value) !== -1;
            o.disabled = !allow;
            o.hidden = !allow;
        }
        // Default to SP500 on entry. If user has already picked a US
        // index this session, keep it.
        if (DIVIDEND_ALLOWED_INDICES.indexOf(idx.value) === -1) {
            idx.value = 'SP500';
        }
    } else {
        for (var j = 0; j < idx.options.length; j++) {
            idx.options[j].disabled = false;
            idx.options[j].hidden = false;
        }
        if (_savedIndexFilterBeforeDividend !== null) {
            idx.value = _savedIndexFilterBeforeDividend;
            _savedIndexFilterBeforeDividend = null;
        }
    }
}

function setGlobalMode(mode) {
    globalMode = mode;
    localStorage.setItem('tickerdb_gallery_mode', mode);
    document.getElementById('btn-price').classList.toggle('active', mode === 'price');
    document.getElementById('btn-ratio').classList.toggle('active', mode === 'ratio');
    document.getElementById('btn-stage').classList.toggle('active', mode === 'stage');
    document.getElementById('btn-dividend').classList.toggle('active', mode === 'dividend');
    document.getElementById('btn-mace').classList.toggle('active', mode === 'mace');
    document.body.classList.toggle('stage-mode', mode === 'stage');
    // Show/hide stage dropdown
    var sf = document.getElementById('stage-filter');
    sf.style.display = (mode === 'stage') ? '' : 'none';
    if (mode !== 'stage') sf.value = '';
    // Show/hide ratio sort dropdown + re-apply its current value when
    // entering ratio mode (so switching away and back preserves the sort).
    var rs = document.getElementById('ratio-sort');
    if (rs) {
        rs.style.display = (mode === 'ratio') ? '' : 'none';
        if (mode !== 'ratio') {
            // Leave value alone (user may toggle back) but undo the DOM
            // reordering so other modes aren't affected.
            restoreOriginalOrder();
        }
    }
    // Index-filter constraint: in dividend mode only US indices have
    // data (Tiingo-cache-only pipeline). Disable non-US options and
    // default to SP500 on entry. Restore full dropdown on exit.
    applyDividendIndexConstraint(mode);
    // Show/hide MACE table vs card grid
    var macePanel = document.getElementById('mace-panel');
    var gridEl = document.getElementById('grid');
    if (mode === 'mace') {
        gridEl.style.display = 'none';
        macePanel.style.display = '';
        buildMaceTable();
        refreshExportCmds();
        return;
    } else {
        gridEl.style.display = '';
        macePanel.style.display = 'none';
    }
    // Stage mode swaps to the weekly stage PNG; other modes apply normally.
    allCards.forEach(function(card) { applyCardMode(card, mode); });
    // Remove existing stage headers
    var oldHeaders = grid.querySelectorAll('.stage-header');
    for (var i = 0; i < oldHeaders.length; i++) { oldHeaders[i].remove(); }
    if (mode === 'stage') {
        applyStageGrouping();
    } else {
        restoreOriginalOrder();
    }
    // Update lightbox if open
    if (lb.classList.contains('open') && visibleCards[lbIndex]) {
        showLbSlide(lbIndex);
    }
    // Re-apply ratio sort if user had one selected and we're entering
    // ratio mode (dropdown state survives mode switches).
    if (mode === 'ratio') {
        var rsEl = document.getElementById('ratio-sort');
        if (rsEl && rsEl.value) { applyRatioSort(rsEl.value); }
    }
    // Re-run the visibility filter so mode-specific card hides kick in
    // (dividend mode hides non-US cards; the dividend-index constraint
    // above also mutated the dropdown value, but didn't fire a change
    // event). Without this, switching into dividend mode leaves
    // yesterday's mode's filter state on screen until the user types
    // in the search box.
    applyFilter();
    refreshExportCmds();
}

// Jump from the MACE table to Stage mode pre-filtered to a single ticker.
// Use case: user scans the MACE table, spots an interesting ticker, clicks
// the ticker or name cell -- Stage mode opens with just that stage chart
// visible so they can see the weekly U3/D3 setup in context.
// Sort visible cards by their ratio-perf metric (last close of the
// base-100 DAT). Called from the ratio-mode sort dropdown. Empty-value
// cards (no ratio data for the index) keep their original order at the
// tail. Only active while in ratio mode.
function applyRatioSort(direction) {
    if (globalMode !== 'ratio') { return; }
    if (!direction) {
        restoreOriginalOrder();
        return;
    }
    var cards = Array.prototype.slice.call(grid.children).filter(function(n) {
        return n.classList && n.classList.contains('card');
    });
    cards.sort(function(a, b) {
        var pa = parseFloat(a.dataset.ratioPerf);
        var pb = parseFloat(b.dataset.ratioPerf);
        // NaN entries sink to bottom regardless of direction.
        var aMissing = isNaN(pa);
        var bMissing = isNaN(pb);
        if (aMissing && bMissing) { return 0; }
        if (aMissing) { return 1; }
        if (bMissing) { return -1; }
        return direction === 'desc' ? (pb - pa) : (pa - pb);
    });
    cards.forEach(function(c) { grid.appendChild(c); });
}

function jumpToStage(ticker) {
    if (!ticker) { return; }
    // Pin exact-match so applyFilter doesn't substring-hit (e.g. "A"
    // lighting up AAPL, ABNB, ALL). Pin is cleared by the input
    // listeners below on any subsequent search/index interaction.
    // card.dataset.ticker is stored lowercased (see card creation); match
    // the same shape or the exact-equality compare in applyFilter fails
    // and the jump surfaces zero cards.
    pinnedTicker = String(ticker).toLowerCase();
    var search = document.getElementById('search');
    if (search) { search.value = String(ticker); }
    var idx = document.getElementById('index-filter');
    if (idx) { idx.value = ''; }
    var sf = document.getElementById('stage-filter');
    if (sf) { sf.value = ''; }
    setGlobalMode('stage');
    // setGlobalMode -> applyFilter uses the search value we just set; no
    // extra applyFilter call needed, but re-assert in case mode-switch
    // races the search input listener.
    applyFilter();
    // Scroll the grid into view so the one visible card is obvious.
    var grid = document.getElementById('grid');
    if (grid) { grid.scrollIntoView({behavior: 'smooth', block: 'start'}); }
}

// ============================================================
// MACE comparison table
// ============================================================
var maceSortCol = 'ticker';
var maceSortAsc = true;

function stageRank(s) {
    var order = {U3:1, U2:2, U1:3, D1:4, D2:5, D3:6, Mixed:7};
    return order[s] || 8;
}

function normalizeMaceName(name) {
    return String(name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function escapeHtml(value) {
    return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function aggregateMaceStage(memberships) {
    var nonNullStages = [];
    memberships.forEach(function(membership) {
        if (membership.stage != null && nonNullStages.indexOf(membership.stage) === -1) {
            nonNullStages.push(membership.stage);
        }
    });
    if (nonNullStages.length === 0) return null;
    if (nonNullStages.length > 1) return 'Mixed';
    return nonNullStages[0];
}

function buildMaceRows() {
    var groups = {};
    Object.keys(STAGES).sort().forEach(function(idx) {
        var priceMap = STAGES[idx] || {};
        var nameMap = NAMES[idx] || {};
        Object.keys(priceMap).sort().forEach(function(ticker) {
            var name = nameMap[ticker] || '';
            var key = ticker + '|' + normalizeMaceName(name);
            if (!groups[key]) {
                groups[key] = {
                    key: key,
                    ticker: ticker,
                    name: name,
                    memberships: []
                };
            } else if (!groups[key].name && name) {
                groups[key].name = name;
            }
            groups[key].memberships.push({
                index: idx,
                stage: priceMap[ticker] === undefined ? null : priceMap[ticker]
            });
        });
    });
    return Object.keys(groups).map(function(key) {
        var row = groups[key];
        row.aggregateStage = aggregateMaceStage(row.memberships);
        row.membershipCount = row.memberships.length;
        return row;
    });
}

function renderMaceMemberships(row) {
    return '<div class="mace-memberships">' + row.memberships.map(function(membership) {
        var stageLabel = membership.stage == null ? '-' : membership.stage;
        return '<span class="mace-membership">'
            + '<span>' + escapeHtml(membership.index) + '</span>'
            + '<span class="mace-membership-stage">' + escapeHtml(stageLabel) + '</span>'
            + '</span>';
    }).join('') + '</div>';
}

function maceStageLabel(stage) {
    return stage == null ? '-' : stage;
}

function maceRowMatchesStage(row, stageFilter) {
    if (!stageFilter) return true;
    if (stageFilter === 'Mixed') return row.aggregateStage === 'Mixed';
    if (stageFilter === 'Unclassified') {
        return row.memberships.some(function(membership) { return membership.stage == null; });
    }
    return row.memberships.some(function(membership) { return membership.stage === stageFilter; });
}

function maceRowMatchesSearch(row, searchVal) {
    if (!searchVal) return true;
    // Collect every string the user might be searching for -- ticker,
    // name, aggregate stage (U1..D3/Mixed/Unclassified), every index
    // the symbol belongs to, every per-index stage. Filter null/
    // undefined explicitly so a bad row doesn't nuke the whole search.
    var haystack = [];
    function push(v) { if (v != null && v !== '') { haystack.push(String(v)); } }
    push(row.ticker);
    push(row.name);
    push(maceStageLabel(row.aggregateStage));
    if (row.aggregateStage == null) push('Unclassified');
    (row.memberships || []).forEach(function(m) {
        push(m.index);
        push(maceStageLabel(m.stage));
        if (m.stage == null) push('Unclassified');
    });
    return haystack.join(' ').toLowerCase().indexOf(searchVal) !== -1;
}

function buildMaceTable() {
    var idxFilter = document.getElementById('mace-index-filter').value;
    var stageFilter = document.getElementById('mace-stage-filter').value;
    var searchVal = document.getElementById('mace-search').value.toLowerCase().trim();
    var sortSelect = document.getElementById('mace-sort');
    if (sortSelect && sortSelect.value !== maceSortCol) {
        maceSortCol = sortSelect.value;
        maceSortAsc = true;
    }

    var rows = buildMaceRows().filter(function(row) {
        var matchIdx = !idxFilter || row.memberships.some(function(membership) {
            return membership.index === idxFilter;
        });
        return matchIdx && maceRowMatchesStage(row, stageFilter) && maceRowMatchesSearch(row, searchVal);
    });

    // Sort
    rows.sort(function(a, b) {
        var va, vb;
        if (maceSortCol === 'stage') {
            va = stageRank(a.aggregateStage);
            vb = stageRank(b.aggregateStage);
        } else if (maceSortCol === 'membershipCount') {
            va = a.membershipCount;
            vb = b.membershipCount;
        } else {
            va = a[maceSortCol] || '';
            vb = b[maceSortCol] || '';
        }
        if (va < vb) return maceSortAsc ? -1 : 1;
        if (va > vb) return maceSortAsc ? 1 : -1;
        return 0;
    });

    // Build table
    var cols = [
        {key: 'ticker',          label: 'Ticker'},
        {key: 'name',            label: 'Name'},
        {key: 'stage',           label: 'Stage'},
        {key: 'membershipCount', label: 'Count'},
        {key: 'memberships',     label: 'Memberships'},
    ];

    var html = '<table class="mace-table"><thead><tr>';
    cols.forEach(function(col) {
        var sortable = col.key !== 'memberships';
        var arrow = sortable && maceSortCol === col.key ? (maceSortAsc ? ' &#9650;' : ' &#9660;') : '';
        var click = sortable ? ' onclick="sortMaceTable(\'' + col.key + '\')"' : '';
        html += '<th data-col="' + col.key + '"' + click + '>'
              + col.label + '<span class="sort-arrow">' + arrow + '</span></th>';
    });
    html += '</tr></thead><tbody>';

    if (rows.length === 0) {
        html += '<tr><td colspan="5" style="text-align:center;color:#616161;padding:20px;">No stage data available</td></tr>';
    }

    rows.forEach(function(r) {
        var ps = maceStageLabel(r.aggregateStage);
        var dataStage = r.aggregateStage == null ? 'null' : r.aggregateStage;
        // Ticker + name cells jump to Stage mode, pre-filtered to this
        // ticker so the stage chart renders as the only visible card.
        var jumpArg = JSON.stringify(r.ticker).replace(/"/g, '&quot;');
        var linkStyle = 'cursor:pointer;color:var(--accent, #00BCD4);text-decoration:underline;';
        html += '<tr>'
            + '<td><strong><a class="mace-jump" style="' + linkStyle + '" onclick="jumpToStage(' + jumpArg + ')">' + escapeHtml(r.ticker) + '</a></strong></td>'
            + '<td><a class="mace-jump" style="' + linkStyle + '" onclick="jumpToStage(' + jumpArg + ')">' + escapeHtml(r.name || '-') + '</a></td>'
            + '<td><span class="mace-stage" data-s="' + escapeHtml(dataStage) + '">' + escapeHtml(ps) + '</span></td>'
            + '<td>' + r.membershipCount + '</td>'
            + '<td>' + renderMaceMemberships(r) + '</td>'
            + '</tr>';
    });

    html += '</tbody></table>';
    html += '<div style="margin-top:8px;color:#616161;font-size:0.75rem;">' + rows.length + ' symbols</div>';
    document.getElementById('mace-table-wrap').innerHTML = html;
}

function sortMaceTable(col) {
    if (maceSortCol === col) {
        maceSortAsc = !maceSortAsc;
    } else {
        maceSortCol = col;
        maceSortAsc = true;
    }
    var sortSelect = document.getElementById('mace-sort');
    if (sortSelect && sortSelect.value !== col) sortSelect.value = col;
    buildMaceTable();
}

function applyCardMode(card, mode) {
    var ratioSrc = card.dataset.ratioSrc;
    var divSrc   = card.dataset.divSrc || '';
    var stageSrc = card.dataset.stageSrc || '';
    var priceSrc = card.dataset.src;
    var img = card.querySelector('.card-img-wrap img');
    var ph  = card.querySelector('.placeholder');
    if (img) {
        var newSrc;
        if (mode === 'ratio' && ratioSrc) {
            newSrc = ratioSrc;
        } else if (mode === 'dividend' && divSrc) {
            newSrc = divSrc;
        } else if (mode === 'stage' && stageSrc) {
            newSrc = stageSrc;
        } else {
            newSrc = priceSrc;
        }
        if (img.src !== newSrc) {
            img.style.opacity = '0';
            img.src = newSrc;
            img.onload = function() {
                img.style.opacity = '1';
                if (ph) ph.style.display = 'none';
            };
            img.onerror = function() {
                img.style.opacity = '1';
                if (mode === 'dividend' && !divSrc) {
                    img.style.display = 'none';
                    if (ph) { ph.style.display = ''; ph.querySelector('span').textContent = 'No dividend data'; }
                } else if (mode === 'stage' && !stageSrc) {
                    img.style.display = 'none';
                    if (ph) { ph.style.display = ''; ph.querySelector('span').textContent = 'No stage chart'; }
                }
            };
        }
        if (mode === 'dividend' && !divSrc) {
            img.style.display = 'none';
            if (ph) { ph.style.display = ''; ph.querySelector('span').textContent = 'No dividend data'; }
        } else if (mode === 'stage' && !stageSrc) {
            img.style.display = 'none';
            if (ph) { ph.style.display = ''; ph.querySelector('span').textContent = 'No stage chart'; }
        } else {
            img.style.display = '';
        }
    }
    var btn = card.querySelector('.card-mode-btn');
    if (btn) { btn.classList.toggle('ratio-active', mode === 'ratio'); }
}

function toggleCard(event, btn) {
    event.stopPropagation();
    var card = btn.closest('.card');
    var isRatio = btn.classList.contains('ratio-active');
    applyCardMode(card, isRatio ? 'price' : 'ratio');
}

// ============================================================
// Stage grouping helpers
// ============================================================
function getCardStage(card) {
    var idx = card.dataset.index;
    var ticker = card.dataset.ticker.toUpperCase();
    var stageMap = STAGES[idx];
    if (!stageMap) return null;
    var val = stageMap[ticker];
    return (val === undefined) ? null : val;
}

function applyStageFilter(stage) {
    // If a specific stage is selected, hide cards not matching that stage
    // then re-apply grouping (which only operates on visible cards)
    var idxVal = document.getElementById('index-filter').value;
    var searchVal = document.getElementById('search').value.toLowerCase();
    allCards.forEach(function(card) {
        var show = true;
        if (idxVal && card.dataset.index !== idxVal) show = false;
        if (searchVal && card.dataset.ticker.toLowerCase().indexOf(searchVal) === -1
            && (card.dataset.name || '').toLowerCase().indexOf(searchVal) === -1) show = false;
        if (stage && getCardStage(card) !== stage) show = false;
        card.style.display = show ? '' : 'none';
    });
    // Remove old stage headers
    grid.querySelectorAll('.stage-header').forEach(function(h) { h.remove(); });
    applyStageGrouping();
}

function applyStageGrouping() {
    // Collect visible cards
    var visible = [];
    allCards.forEach(function(card) {
        if (card.style.display !== 'none') visible.push(card);
    });
    // Detach all cards and headers from grid
    allCards.forEach(function(card) { if (card.parentNode === grid) grid.removeChild(card); });

    // Determine if we're showing a single index or all
    var selIdx = document.getElementById('index-filter').value;

    if (selIdx) {
        // Single index: flat stage grouping
        var groups = {};
        STAGE_ORDER.forEach(function(s) { groups[String(s)] = []; });
        visible.forEach(function(card) {
            var stage = getCardStage(card);
            var key = String(stage);
            if (!groups[key]) groups[key] = [];
            groups[key].push(card);
        });
        STAGE_ORDER.forEach(function(s) {
            var key = String(s);
            var cards = groups[key];
            if (!cards || cards.length === 0) return;
            var hdr = document.createElement('div');
            hdr.className = 'stage-header';
            hdr.dataset.stage = key;
            hdr.textContent = (STAGE_LABELS[key] || key) + '  (' + cards.length + ')';
            grid.insertBefore(hdr, empty);
            cards.forEach(function(c) { grid.insertBefore(c, empty); });
        });
    } else {
        // ALL indices: group by index first, then by stage within each index
        var byIndex = {};
        visible.forEach(function(card) {
            var idx = card.dataset.index;
            if (!byIndex[idx]) byIndex[idx] = [];
            byIndex[idx].push(card);
        });
        var idxKeys = Object.keys(byIndex).sort();
        idxKeys.forEach(function(idx) {
            var idxCards = byIndex[idx];
            // Sub-group by stage
            var groups = {};
            STAGE_ORDER.forEach(function(s) { groups[String(s)] = []; });
            idxCards.forEach(function(card) {
                var stage = getCardStage(card);
                var key = String(stage);
                if (!groups[key]) groups[key] = [];
                groups[key].push(card);
            });
            // Count how many cards have a real stage in this index
            var hasStages = false;
            STAGE_ORDER.forEach(function(s) {
                var key = String(s);
                if (key !== 'null' && groups[key] && groups[key].length > 0) hasStages = true;
            });
            // Insert index section header
            var idxHdr = document.createElement('div');
            idxHdr.className = 'stage-header';
            idxHdr.dataset.stage = 'index';
            idxHdr.textContent = idx + '  (' + idxCards.length + ')';
            idxHdr.style.fontSize = '1.2em';
            idxHdr.style.borderColor = 'var(--accent)';
            idxHdr.style.color = 'var(--accent)';
            idxHdr.style.marginTop = '1.5em';
            grid.insertBefore(idxHdr, empty);

            if (hasStages) {
                // Insert stage sub-groups
                STAGE_ORDER.forEach(function(s) {
                    var key = String(s);
                    var cards = groups[key];
                    if (!cards || cards.length === 0) return;
                    var hdr = document.createElement('div');
                    hdr.className = 'stage-header';
                    hdr.dataset.stage = key;
                    hdr.textContent = (STAGE_LABELS[key] || key) + '  (' + cards.length + ')';
                    grid.insertBefore(hdr, empty);
                    cards.forEach(function(c) { grid.insertBefore(c, empty); });
                });
            } else {
                // No stage data for this index -- insert cards unsorted
                idxCards.forEach(function(c) { grid.insertBefore(c, empty); });
            }
        });
    }
    // Rebuild visibleCards in new (DOM) order
    rebuildVisibleCards();
}

function restoreOriginalOrder() {
    // Sort cards back to original creation order and re-insert
    var sorted = allCards.slice().sort(function(a, b) {
        return Number(a.dataset.originalOrder) - Number(b.dataset.originalOrder);
    });
    sorted.forEach(function(card) { grid.insertBefore(card, empty); });
    rebuildVisibleCards();
}

function rebuildVisibleCards() {
    visibleCards = [];
    // In stage mode, use DOM order (stage-grouped) instead of creation order
    if (globalMode === 'stage') {
        var children = grid.children;
        for (var i = 0; i < children.length; i++) {
            var el = children[i];
            if (el.classList.contains('card') && el.style.display !== 'none') {
                visibleCards.push(el);
            }
        }
    } else {
        allCards.forEach(function(card) {
            if (card.style.display !== 'none') visibleCards.push(card);
        });
    }
    updateStatus(visibleCards.length);
}

// ============================================================
// Card factory
// ============================================================
function tickerFromFilename(name) {
    // Strip trailing _NNm suffix: AAPL_18m -> AAPL
    return name.replace(/_\d+m$/, '');
}

function makeCard(index, filename, imgPath) {
    var ticker = tickerFromFilename(filename);
    var card   = document.createElement('div');
    card.className = 'card';
    card.dataset.index    = index;
    card.dataset.ticker   = ticker.toLowerCase();
    card.dataset.src      = imgPath;
    card.dataset.label    = ticker;
    card.dataset.idxlabel = index;
    var nameMap = NAMES[index] || {};
    var companyName = nameMap[ticker.toUpperCase()] || '';
    card.dataset.name = companyName.toLowerCase();

    // Look up ratio stem for this ticker in this index
    var ratioMap  = RATIO[index] || {};
    var tickerKey = ticker.toUpperCase();
    var ratioStem = ratioMap[tickerKey] || '';
    var ratioSrc  = '';
    if (ratioStem) {
        ratioSrc = BASE
            ? (BASE + '/' + index + '/ratios/' + ratioStem + '.png')
            : (index + '/ratios/' + ratioStem + '.png');
    }
    card.dataset.ratioSrc = ratioSrc;

    // Ratio perf metric (last close of base-100 DAT, missing = NaN).
    var perfMap = RATIO_PERF[index] || {};
    var perfVal = perfMap[tickerKey];
    card.dataset.ratioPerf = (perfVal != null) ? String(perfVal) : '';

    // Look up dividend stem for this ticker in this index
    var divMap  = DIV[index] || {};
    var divStem = divMap[tickerKey] || '';
    var divSrc  = '';
    if (divStem) {
        divSrc = BASE
            ? (BASE + '/' + index + '/dividends/' + divStem + '.png')
            : (index + '/dividends/' + divStem + '.png');
    }
    card.dataset.divSrc = divSrc;

    // Look up weekly stage chart PNG for this ticker in this index
    var stageMap  = STAGE_CHARTS[index] || {};
    var stageStem = stageMap[tickerKey] || '';
    var stageSrc  = '';
    if (stageStem) {
        stageSrc = BASE
            ? (BASE + '/' + index + '/stage/' + stageStem + '.png')
            : (index + '/stage/' + stageStem + '.png');
    }
    card.dataset.stageSrc = stageSrc;

    var hasAlt = ratioSrc || divSrc;
    var modeBtn = hasAlt
        ? '<button class="card-mode-btn" onclick="toggleCard(event, this)">P/R</button>'
        : '<button class="card-mode-btn" style="display:none" onclick="toggleCard(event, this)">P/R</button>';

    // Resolve MACE stage for this card
    var stageMap = STAGES[index] || {};
    var cardStage = stageMap[tickerKey];
    if (cardStage === undefined) cardStage = null;
    var stageDotAttr = 'data-stage="' + String(cardStage) + '"';

    card.innerHTML =
        '<div class="card-img-wrap">' +
            modeBtn +
            '<div class="placeholder">' +
                '<div class="placeholder-icon">~</div>' +
                '<span>chart unavailable</span>' +
            '</div>' +
            '<img loading="lazy" src="' + imgPath + '" alt="' + ticker + '"' +
                 ' onload="this.style.opacity=1;this.previousElementSibling.style.display=\'none\';"' +
                 ' onerror="this.style.display=\'none\';"' +
                 ' style="opacity:0;">' +
        '</div>' +
        '<div class="card-foot">' +
            '<span class="stage-dot" ' + stageDotAttr + '></span>' +
            '<span class="ticker">' + (companyName ? companyName + ' (' + ticker + ')' : ticker) + '</span>' +
            '<span class="idx-tag">' + index + '</span>' +
        '</div>';

    card.addEventListener('click', function() { openLightbox(card); });

    // Restore saved global mode on creation
    if (globalMode === 'ratio' && ratioSrc) {
        setTimeout(function() { applyCardMode(card, 'ratio'); }, 0);
    } else if (globalMode === 'dividend') {
        setTimeout(function() { applyCardMode(card, 'dividend'); }, 0);
    }

    return card;
}

// ============================================================
// Render grid
// ============================================================
var grid  = document.getElementById('grid');
var empty = document.getElementById('empty');

var allCards = [];

indices.forEach(function(idx) {
    DATA[idx].forEach(function(filename) {
        var imgPath = BASE ? (BASE + '/' + idx + '/' + filename + '.png') : (idx + '/' + filename + '.png');
        var card = makeCard(idx, filename, imgPath);
        card.dataset.originalOrder = String(allCards.length);
        allCards.push(card);
        grid.appendChild(card);
    });
});
grid.appendChild(empty); // keep empty message last

// ============================================================
// Filtering
// ============================================================
function applyFilter() {
    var selIdx  = document.getElementById('index-filter').value;
    var search  = document.getElementById('search').value.trim().toLowerCase();
    var shown   = 0;

    visibleCards = [];

    allCards.forEach(function(card) {
        var matchIdx    = !selIdx || card.dataset.index === selIdx;
        var name        = (card.dataset.name || '').toLowerCase();
        var matchSearch;
        if (pinnedTicker) {
            // Exact-match mode (set by MACE-table jump). Prevents a
            // search like "A" from matching AAPL, ABNB, ALL etc.
            matchSearch = card.dataset.ticker === pinnedTicker;
        } else {
            matchSearch = !search || card.dataset.ticker.includes(search) || name.includes(search);
        }
        // In dividend mode, suppress cards that have no dividend PNG
        // (currently: all non-US indices -- Tiingo-cache-only data source
        // doesn't cover European dividends today). Prevents blank cards
        // and stops the lightbox from falling through to the price PNG.
        // European dividend support is a future feature (see HANDOVER
        // Stream 1 backlog).
        var matchMode   = globalMode !== 'dividend' || !!card.dataset.divSrc;
        var visible     = matchIdx && matchSearch && matchMode;
        card.style.display = visible ? '' : 'none';
        if (visible) { visibleCards.push(card); shown++; }
    });

    empty.style.display = shown === 0 ? 'block' : 'none';
    updateStatus(shown);

    // Re-apply stage grouping if in stage mode
    if (globalMode === 'stage') {
        // Remove old stage headers
        var oldH = grid.querySelectorAll('.stage-header');
        for (var h = 0; h < oldH.length; h++) { oldH[h].remove(); }
        applyStageGrouping();
    }
    // Rebuild MACE table if in mace mode (picks up search/index filters)
    if (globalMode === 'mace') {
        buildMaceTable();
    }
}

function updateStatus(n) {
    var total = allCards.length;
    document.getElementById('status').innerHTML =
        '<strong>' + n + '</strong> / ' + total + ' chart' + (total !== 1 ? 's' : '');
}

// Any manual control interaction clears the MACE-jump pin so normal
// substring search resumes.
document.getElementById('index-filter').addEventListener('change', function() {
    pinnedTicker = null;
    applyFilter();
});
document.getElementById('search').addEventListener('input', function() {
    pinnedTicker = null;
    applyFilter();
});
document.getElementById('mace-index-filter').addEventListener('change', buildMaceTable);
document.getElementById('mace-stage-filter').addEventListener('change', buildMaceTable);
document.getElementById('mace-search').addEventListener('input', buildMaceTable);
document.getElementById('mace-sort').addEventListener('change', function() {
    maceSortCol = this.value;
    maceSortAsc = true;
    buildMaceTable();
});

// ============================================================
// Column slider
// ============================================================
var slider   = document.getElementById('col-slider');
var colLabel = document.getElementById('col-label');

function setCols(n) {
    document.documentElement.style.setProperty('--cols', n);
    colLabel.textContent = n + ' col' + (n !== 1 ? 's' : '');
}

slider.addEventListener('input', function() { setCols(Number(slider.value)); });
setCols(Number(slider.value));

// ============================================================
// Lightbox
// ============================================================
var lb    = document.getElementById('lightbox');
var lbImg = document.getElementById('lb-img');
var lbCap = document.getElementById('lb-caption');
var lbCtr = document.getElementById('lb-counter');

function openLightbox(card) {
    lbIndex = visibleCards.indexOf(card);
    if (lbIndex < 0) { lbIndex = 0; }
    showLbSlide(lbIndex);
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
}

function showLbSlide(i) {
    var card = visibleCards[i];
    if (!card) { return; }
    var ratioSrc = card.dataset.ratioSrc;
    var divSrc   = card.dataset.divSrc || '';
    var stageSrc = card.dataset.stageSrc || '';
    var src;
    if (globalMode === 'ratio' && ratioSrc) {
        src = ratioSrc;
    } else if (globalMode === 'dividend' && divSrc) {
        src = divSrc;
    } else if (globalMode === 'stage' && stageSrc) {
        src = stageSrc;
    } else {
        src = card.dataset.src;
    }
    lbImg.src = src;
    lbImg.alt = card.dataset.label;
    lbCap.innerHTML = card.dataset.label + '<span>' + card.dataset.idxlabel + '</span>';
    lbCtr.textContent = (i + 1) + ' / ' + visibleCards.length;
    lbIndex = i;
}

function lbStep(dir) {
    var next = (lbIndex + dir + visibleCards.length) % visibleCards.length;
    showLbSlide(next);
}

document.getElementById('lb-backdrop').addEventListener('click', closeLightbox);
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', function() { lbStep(-1); });
document.getElementById('lb-next').addEventListener('click', function() { lbStep(+1); });

document.addEventListener('keydown', function(e) {
    if (!lb.classList.contains('open')) { return; }
    if (e.key === 'Escape')     { closeLightbox(); }
    if (e.key === 'ArrowLeft')  { lbStep(-1); }
    if (e.key === 'ArrowRight') { lbStep(+1); }
});

// ============================================================
// Export panel
// ============================================================
function buildExportCmd(fmt) {
    var selIdx = document.getElementById('index-filter').value || 'ALL';
    var mode   = globalMode;
    return 'python scripts/presentations/run_export.py'
        + ' --index ' + selIdx
        + ' --mode '  + mode
        + ' --format ' + fmt;
}

function refreshExportCmds() {
    var pdf  = document.getElementById('exp-cmd-pdf');
    var pptx = document.getElementById('exp-cmd-pptx');
    if (pdf)  pdf.textContent  = buildExportCmd('pdf');
    if (pptx) pptx.textContent = buildExportCmd('pptx');
}

function toggleExportPanel() {
    var btn   = document.getElementById('export-btn');
    var panel = document.getElementById('export-panel');
    var open  = panel.classList.toggle('open');
    btn.classList.toggle('open', open);
    if (open) { refreshExportCmds(); }
}

function copyCmd(elemId, btn) {
    var text = document.getElementById(elemId).textContent;
    // Show feedback immediately -- clipboard may fail silently on file:// origins
    function showCopied() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(showCopied, function() {
            // Clipboard API blocked (file:// origin) -- fall back to execCommand
            _execCommandCopy(text);
            showCopied();
        });
    } else {
        _execCommandCopy(text);
        showCopied();
    }
}

function _execCommandCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
}

// Refresh commands when index or mode changes
document.getElementById('index-filter').addEventListener('change', function() {
    refreshExportCmds();
});

// Close export panel on outside click
document.addEventListener('click', function(e) {
    var wrap = document.querySelector('.export-wrap');
    if (wrap && !wrap.contains(e.target)) {
        document.getElementById('export-panel').classList.remove('open');
        document.getElementById('export-btn').classList.remove('open');
    }
});

// ============================================================
// Init
// ============================================================
// Restore persisted mode (syncs buttons, dropdown, stage grouping, card images)
setGlobalMode(globalMode);
applyFilter();
</script>
